<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>CTA link smoke</title>
    <link rel="stylesheet" href="./jsu-wrapped.css?v=jsuw-prod-20260602a">
    <style>
      body {
        background: #f4f7fb;
        margin: 0;
      }

      .qa-page {
        align-items: center;
        box-sizing: border-box;
        display: flex;
        min-height: 100vh;
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <main class="qa-page">
      <div
        id="jsu-wrapped"
        data-year="2026"
        data-source="./sample-wrapped-2026.json?v=jsuw-prod-20260602a"
        data-config-source="./wrapped-config-2026.json?v=jsuw-prod-20260602a"
        data-share-base="./share/"
        data-cta-label="Get involved next year"
        data-cta-href="./cta-link-target-smoke.html?existing=1"
      ></div>
    </main>
    <script src="./jsu-wrapped.js?v=jsuw-prod-20260602a"></script>
    <script>
      (function () {
        var root = document.getElementById("jsu-wrapped");
        var attempts = 0;

        function step() {
          attempts += 1;

          var cta = root && root.querySelector('[data-jsuw-action="cta"]');
          if (cta) {
            cta.click();
            return;
          }

          var next = root && root.querySelector('[data-jsuw-action="next"]');
          if (next) {
            next.click();
          }

          if (attempts < 40) {
            window.setTimeout(step, 175);
          } else {
            document.documentElement.setAttribute("data-cta-link-smoke", "timeout");
          }
        }

        function start() {
          window.setTimeout(step, 350);
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", start, { once: true });
        } else {
          start();
        }
      })();
    </script>
  </body>
</html>
