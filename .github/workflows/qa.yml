name: QA

on:
  push:
  pull_request:

jobs:
  smoke:
    name: Static widget smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run production check
        run: node check-production.js

      - name: Set up Chrome for render smoke
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run enforced render smoke
        run: node render-smoke.js --browser "${{ steps.setup-chrome.outputs.chrome-path }}" --timeout-ms 30000
