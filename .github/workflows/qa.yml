name: QA

on:
  push:
  pull_request:

jobs:
  smoke:
    name: Static widget smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Sync WordPress inline embed
        run: node sync-wordpress-inline.js

      - name: Ensure inline embed is committed
        run: git diff --exit-code wordpress-inline-embed.html

      - name: Generate static share pages
        run: node generate-share-pages.js

      - name: Ensure static share pages are committed
        run: |
          git diff --exit-code share
          test -z "$(git status --porcelain -- share)"

      - name: Validate wrapped data
        run: node validate-wrapped-data.js

      - name: Syntax check renderer
        run: node --check jsu-wrapped.js

      - name: Syntax check builder
        run: node --check wrapped-builder.js

      - name: Syntax check data validator
        run: node --check validate-wrapped-data.js

      - name: Syntax check sync script
        run: node --check sync-wordpress-inline.js

      - name: Syntax check share page generator
        run: node --check generate-share-pages.js

      - name: Syntax check smoke script
        run: node --check qa-smoke.js

      - name: Run smoke tests
        run: node qa-smoke.js

      - name: Check whitespace
        run: git diff --check
