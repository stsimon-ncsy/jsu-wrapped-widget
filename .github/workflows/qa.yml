name: QA

on:
  push:
  pull_request:

jobs:
  smoke:
    name: Static widget smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run production check
        run: node check-production.js
